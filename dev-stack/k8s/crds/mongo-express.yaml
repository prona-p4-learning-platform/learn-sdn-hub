apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express
  namespace: learn-sdn-hub
  labels:
    app: mongo-express
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-express
  template:
    metadata:
      labels:
        app: mongo-express
    spec:
      containers:
        - name: mongo-express
          image: mongo-express:latest
          ports:
            - containerPort: 8081
          env:
            - name: ME_CONFIG_BASICAUTH
              value: "false"
            
            - name: ME_CONFIG_MONGODB_SERVER
              value: "prona4-db-svc"
            
            - name: ME_CONFIG_MONGODB_ADMINPASSWORD
              valueFrom:
                secretKeyRef:
                  name: admin-password
                  key: password
            - name: ME_CONFIG_MONGODB_ADMINUSERNAME
              value: "admin"
          command: ["/bin/bash", "-c"]
          args:
            - >-
              export ME_CONFIG_MONGODB_URL="mongodb://${ME_CONFIG_MONGODB_ADMINUSERNAME}:${ME_CONFIG_MONGODB_ADMINPASSWORD}@${ME_CONFIG_MONGODB_SERVER}:27017/?replicaSet=prona4&authSource=admin";
              /docker-entrypoint.sh node app
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-express
  namespace: learn-sdn-hub
spec:
  selector:
    app: mongo-express
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mongo-express
  namespace: learn-sdn-hub
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 128m
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "selfsigned-issuer"
    cert-manager.io/private-key-size: "4096"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - backend:
              service:
                name: mongo-express
                port:
                  number: 8081
            pathType: Prefix
            path: /
      host: mongo-express.local
  tls:
    - hosts:
      - mongo-express.local
      secretName: mongo-express.local